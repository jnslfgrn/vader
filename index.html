<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Väder — SMHI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="lib/leaflet.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="loader" id="loader">
  <div class="loader-spinner"></div>
  <div class="loader-text" id="loaderText">Hämtar väderdata…</div>
</div>

<div class="layout">

  <!-- LEFT: Panel -->
  <div class="panel-col">

    <!-- Panel header -->
    <div class="panel-head">
      <header>
        <div class="header-left">
          <div class="header-title">Väder</div>
          <div class="location-pill">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="opacity:.45;flex-shrink:0"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span id="locationName">Falun, Dalarna</span>
          </div>
          <div class="live-dot"></div>
        </div>
        <button class="theme-btn" id="themeBtn" title="Växla ljust/mörkt läge">
          <svg id="themeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </header>
      <div class="header-actions">
        <button class="locate-btn" id="locateBtn" title="Använd min position">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" stroke-dasharray="2 2" opacity=".4"/></svg>
          Min position
        </button>
        <div class="search-wrap" id="searchWrap">
          <div class="search-row">
            <span class="search-icon">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            </span>
            <input type="text" id="searchInput" class="search-input" placeholder="Sök ort…" autocomplete="off" spellcheck="false">
            <div class="search-spinner" id="searchSpinner"></div>
          </div>
          <div class="search-dropdown" id="searchDropdown"></div>
        </div>
      </div>
    </div>

    <!-- Panel body (scrollable) -->
    <div class="panel-body">

      <!-- Weather stats -->
      <div class="card" style="padding:12px 14px;">
        <div class="wx-stats">
          <div class="wx-stat">
            <span class="wx-stat-icon"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M1 5h7a2 2 0 0 0 0-4M1 9h9a2.5 2.5 0 0 1 0 5"/></svg></span>
            <span class="wx-stat-val" id="wxWind">–</span>
            <span class="wx-stat-unit">m/s <span id="wxDir">–</span></span>
          </div>
          <div class="wx-stat">
            <span class="wx-stat-icon"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M7 2v5.2M7 7.2a2.8 2.8 0 1 0 0 5.6 2.8 2.8 0 0 0 0-5.6z"/></svg></span>
            <span class="wx-stat-val" id="wxPressure">–</span>
            <span class="wx-stat-unit">hPa</span>
          </div>
          <div class="wx-stat">
            <span class="wx-stat-icon"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 1.5c0 0-4 4.5-4 7a4 4 0 0 0 8 0c0-2.5-4-7-4-7z"/></svg></span>
            <span class="wx-stat-val" id="wxHumidity">–</span>
            <span class="wx-stat-unit">%</span>
          </div>
          <div class="wx-stat">
            <span class="wx-stat-icon"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M1 7s2-4.5 6-4.5S13 7 13 7s-2 4.5-6 4.5S1 7 1 7z"/><circle cx="7" cy="7" r="1.8"/></svg></span>
            <span class="wx-stat-val" id="wxVis">–</span>
            <span class="wx-stat-unit">km</span>
          </div>
          <div class="wx-stat">
            <span class="wx-stat-icon"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M2.5 9.5h9a2.5 2.5 0 0 0 0-5 3.5 3.5 0 0 0-6.8-1.2"/><line x1="5" y1="12" x2="5" y2="12.5"/><line x1="7" y1="12" x2="7" y2="13"/><line x1="9" y1="12" x2="9" y2="12.5"/></svg></span>
            <span class="wx-stat-val" id="wxPrecip">–</span>
            <span class="wx-stat-unit" id="wxPrecipType">mm</span>
          </div>
          <div class="wx-stat">
            <span class="wx-stat-icon"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M2 10.5h10a2.5 2.5 0 0 0 0-5 3.5 3.5 0 0 0-6.7-1.5A2 2 0 0 0 2 8.5Z"/></svg></span>
            <span class="wx-stat-val" id="wxCloud">–</span>
            <span class="wx-stat-unit">/8</span>
          </div>
        </div>
      </div>

      <!-- Time slider -->
      <div class="time-bar" style="border-radius:var(--radius);border:1px solid var(--border);">
        <div class="time-bar-top">
          <span class="time-badge" id="timeBadge">Nu</span>
          <span class="time-datetime" id="timeDisplay">–</span>
          <span class="time-label">10 dagar</span>
        </div>
        <input type="range" id="timeSlider" min="0" max="239" value="0" step="1">
        <div class="time-ticks">
          <span class="time-tick">Nu</span>
          <span class="time-tick">+2d</span>
          <span class="time-tick">+4d</span>
          <span class="time-tick">+6d</span>
          <span class="time-tick">+8d</span>
          <span class="time-tick">+10d</span>
        </div>
      </div>

      <!-- Chart + forecast -->
      <div class="bottom-row">
        <div class="card">
          <div class="chart-header">
            <div class="card-label" style="margin:0">Tidsserie · 24h</div>
            <div class="chart-tabs">
              <button class="chart-tab active" data-param="t">Temp</button>
              <button class="chart-tab" data-param="ws">Vind</button>
              <button class="chart-tab" data-param="msl">Tryck</button>
              <button class="chart-tab" data-param="r">Fukt</button>
            </div>
          </div>
          <canvas id="mainChart" height="120"></canvas>
        </div>

        <div class="card">
          <div class="card-label">Timprognos</div>
          <div class="forecast-scroll" id="forecastStrip"></div>
        </div>
      </div>

      <footer>
        <span>SMHI Öppna Data · CC BY 4.0 · Karta © OSM / CARTO</span>
        <span id="footerCoords">60.6065°N 15.6355°E</span>
      </footer>

    </div><!-- /panel-body -->
  </div><!-- /panel-col -->

  <!-- Resize handle -->
  <div class="resize-handle" id="resizeHandle"></div>

  <!-- RIGHT: Map -->
  <div class="map-col">
    <div class="map-section">
      <div class="map-wrap">
        <div id="map"></div>

        <!-- Minimal map overlay: temp + condition only -->
        <div class="wx-overlay" id="wxOverlay">
          <div class="wx-top">
            <div class="wx-temp-block">
              <div class="wx-temp" id="wxTemp">–</div>
              <div class="wx-feels">Känns som <b id="wxFeels">–</b>°C</div>
            </div>
            <div class="wx-cond">
              <div class="wx-cond-icon" id="wxIcon">–</div>
              <div class="wx-cond-text" id="wxCond">Laddar…</div>
            </div>
          </div>
        </div>

        <!-- Alert -->
        <div class="wx-alert" id="wxAlert"></div>
      </div>
    </div>
  </div>

</div><!-- /layout -->

<script src="lib/leaflet.js"></script>
<script>
// ═══════════════════════════════════════
//  State
// ═══════════════════════════════════════
let lat = 60.6065, lon = 15.6355;
let locationLabel = 'Falun, Dalarna';
let allSeries = [];
let currentIdx = 0;
let activeParam = 't';

// ═══════════════════════════════════════
//  Swedish cities database
// ═══════════════════════════════════════
const CITIES = [
  {n:'Stockholm',   lat:59.3293, lon:18.0686},
  {n:'Göteborg',    lat:57.7089, lon:11.9746},
  {n:'Malmö',       lat:55.6050, lon:13.0038},
  {n:'Uppsala',     lat:59.8586, lon:17.6389},
  {n:'Västerås',    lat:59.6162, lon:16.5528},
  {n:'Örebro',      lat:59.2741, lon:15.2066},
  {n:'Linköping',   lat:58.4108, lon:15.6214},
  {n:'Helsingborg', lat:56.0465, lon:12.6945},
  {n:'Jönköping',   lat:57.7826, lon:14.1618},
  {n:'Norrköping',  lat:58.5942, lon:16.1826},
  {n:'Lund',        lat:55.7047, lon:13.1910},
  {n:'Umeå',        lat:63.8258, lon:20.2630},
  {n:'Gävle',       lat:60.6749, lon:17.1413},
  {n:'Borås',       lat:57.7210, lon:12.9401},
  {n:'Eskilstuna',  lat:59.3675, lon:16.5099},

  {n:'Växjö',       lat:56.8777, lon:14.8091},
  {n:'Karlstad',    lat:59.4022, lon:13.5115},
  {n:'Sundsvall',   lat:62.3913, lon:17.3069},
  {n:'Östersund',   lat:63.1792, lon:14.6357},
  {n:'Trollhättan', lat:58.2828, lon:12.2893},
  {n:'Luleå',       lat:65.5848, lon:22.1547},
  {n:'Borlänge',    lat:60.4858, lon:15.4366},
  {n:'Falun',       lat:60.6065, lon:15.6355},
  {n:'Mora',        lat:61.0044, lon:14.5482},
  {n:'Ludvika',     lat:60.1498, lon:15.1875},
  {n:'Avesta',      lat:60.1451, lon:16.1680},
  {n:'Hedemora',    lat:60.2750, lon:15.9834},
  {n:'Sandviken',   lat:60.6177, lon:16.7751},
  {n:'Hudiksvall',  lat:61.7283, lon:17.1058},
  {n:'Bollnäs',     lat:61.3481, lon:16.3940},
  {n:'Söderhamn',   lat:61.3027, lon:17.0665},
  {n:'Köping',      lat:59.5122, lon:15.9979},
  {n:'Sala',        lat:59.9197, lon:16.6085},
  {n:'Nyköping',    lat:58.7531, lon:17.0072},
  {n:'Katrineholm', lat:58.9956, lon:16.2076},
  {n:'Karlskoga',   lat:59.3267, lon:14.5240},
  {n:'Arvika',      lat:59.6556, lon:12.5877},
  {n:'Lidköping',   lat:58.5055, lon:13.1571},
  {n:'Skövde',      lat:58.3893, lon:13.8449},
  {n:'Varberg',     lat:57.1057, lon:12.2501},
  {n:'Kiruna',      lat:67.8557, lon:20.2253},
  {n:'Visby',       lat:57.6348, lon:18.2948},
  {n:'Kalmar',      lat:56.6634, lon:16.3566},
  {n:'Karlskrona',  lat:56.1612, lon:15.5869},
  {n:'Härnösand',   lat:62.6324, lon:17.9393},
  {n:'Skellefteå',  lat:64.7508, lon:20.9528},
  {n:'Örnsköldsvik',lat:63.2896, lon:18.7158},
  {n:'Piteå',       lat:65.3172, lon:21.4795},
  {n:'Falköping',   lat:58.1736, lon:13.5514},
  {n:'Kristianstad',lat:56.0294, lon:14.1567},
];

// ═══════════════════════════════════════
//  Helpers
// ═══════════════════════════════════════
const WIND_DIRS = ['N','NNO','NO','ONO','O','OSO','SO','SSO','S','SSV','SV','VSV','V','VNV','NV','NNV'];
const PRECIP_NAMES = {0:'Ingen',1:'Snö',2:'Snö/regn',3:'Regn',4:'Duggregn',5:'Fr. regn',6:'Fr. dugg'};

function getP(params, name) {
  const p = params.find(x => x.name === name);
  return p ? p.values[0] : null;
}

function compass(deg) { return WIND_DIRS[Math.round(deg / 22.5) % 16]; }

function weatherIcon(pcat, tcc, t) {
  if (pcat === 1 || pcat === 2) return '❄️';
  if (pcat === 3) return '🌧️';
  if (pcat === 4) return '🌦️';
  if (pcat === 5 || pcat === 6) return '🧊';
  if (tcc <= 1) return t > 10 ? '☀️' : '🌤️';
  if (tcc <= 4) return '⛅';
  return '☁️';
}

function weatherText(pcat, tcc, t) {
  if (pcat === 1) return 'Snöfall';
  if (pcat === 2) return 'Snöblandat regn';
  if (pcat === 3) return 'Regn';
  if (pcat === 4) return 'Duggregn';
  if (pcat === 5) return 'Frysande regn';
  if (pcat === 6) return 'Frysande dugg';
  if (tcc <= 1) return t > 15 ? 'Klart och varmt' : 'Klart';
  if (tcc <= 3) return 'Lätt molnighet';
  if (tcc <= 5) return 'Halvklart';
  return 'Mulet';
}

function tempClass(t) {
  if (t === null) return '';
  if (t <= 0)  return 'cold';
  if (t <= 10) return 'cool';
  if (t <= 22) return 'warm';
  return 'hot';
}

function windChill(t, ws) {
  if (t >= 10 || ws <= 1.33) return t;
  const v = ws * 3.6;
  return 13.12 + 0.6215*t - 11.37*Math.pow(v,0.16) + 0.3965*t*Math.pow(v,0.16);
}

function fmtDate(d) {
  return d.toLocaleDateString('sv-SE', {weekday:'short', month:'short', day:'numeric'});
}

function fmtTime(d) {
  return d.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
}

function dist2(a, b) {
  const dlat = a.lat - b.lat, dlon = a.lon - b.lon;
  return dlat*dlat + dlon*dlon;
}

// ═══════════════════════════════════════
//  Map
// ═══════════════════════════════════════
const map = L.map('map', {zoomControl: true, attributionControl: true})
  .setView([lat, lon], 8);

// Ensure map fills its column correctly after DOM layout
setTimeout(() => map.invalidateSize(), 0);

const TILES = {
  dark:  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  light: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
};
const TILE_ATTR = 'Tiles &copy; <a href="https://www.esri.com/">Esri</a> &mdash; Source: Esri, USGS, NOAA';

let tileLayer = L.tileLayer(TILES.dark, {attribution: TILE_ATTR, maxZoom: 19}).addTo(map);

// Main location marker
const mainIcon = L.divIcon({
  html: '<div class="main-marker"><div class="main-marker-ring"></div></div>',
  className: '',
  iconSize: [0, 0],
  iconAnchor: [0, 0],
});

const mainMarker = L.marker([lat, lon], {icon: mainIcon, draggable: true}).addTo(map);

mainMarker.on('dragend', () => {
  const p = mainMarker.getLatLng();
  lat = Math.round(p.lat * 1e4) / 1e4;
  lon = Math.round(p.lng * 1e4) / 1e4;
  reverseGeocode(lat, lon);
  fetchAll();
});

map.on('click', e => {
  lat = Math.round(e.latlng.lat * 1e4) / 1e4;
  lon = Math.round(e.latlng.lng * 1e4) / 1e4;
  mainMarker.setLatLng([lat, lon]);
  reverseGeocode(lat, lon);
  fetchAll();
});

// City marker layer
let cityLayer = L.layerGroup().addTo(map);
let cityStore = {}; // city name → {series, marker}
let nearbyCities = [];

function findNearbyCities(clat, clon, n = 8) {
  return CITIES
    .filter(c => !(Math.abs(c.lat - clat) < 0.01 && Math.abs(c.lon - clon) < 0.01))
    .sort((a, b) => dist2(a, {lat:clat,lon:clon}) - dist2(b, {lat:clat,lon:clon}))
    .slice(0, n);
}

function buildCityIcon(city) {
  const id = 'cm-' + city.n.replace(/\s+/g, '_');
  return L.divIcon({
    html: `<div class="city-marker" id="${id}">
      <div class="city-marker-inner">
        <div class="cm-name">${city.n}</div>
        <div class="cm-row">
          <span class="cm-icon">…</span>
          <span class="cm-temp">–</span>
        </div>
      </div>
    </div>`,
    className: '',
    iconSize: [0, 0],
    iconAnchor: [0, 0],
  });
}

async function loadNearbyCities() {
  nearbyCities = findNearbyCities(lat, lon);
  cityLayer.clearLayers();
  cityStore = {};

  // Add placeholder markers immediately
  nearbyCities.forEach(city => {
    const marker = L.marker([city.lat, city.lon], {icon: buildCityIcon(city)}).addTo(cityLayer);
    marker.on('click', () => {
      lat = city.lat; lon = city.lon;
      locationLabel = city.n;
      document.getElementById('locationName').textContent = city.n;
      document.getElementById('footerCoords').textContent = `${lat}°N ${lon}°E`;
      mainMarker.setLatLng([lat, lon]);
      map.setView([lat, lon], map.getZoom());
      fetchAll();
    });
    cityStore[city.n] = { marker, series: null };
  });

  // Fetch weather for each city in parallel
  const fetches = nearbyCities.map(async city => {
    try {
      const url = `https://opendata-download-metfcst.smhi.se/api/category/pmp3g/version/2/geotype/point/lon/${city.lon}/lat/${city.lat}/data.json`;
      const res = await fetch(url);
      if (!res.ok) return;
      const data = await res.json();
      cityStore[city.n].series = data.timeSeries;
      updateCityMarkerAt(city.n, currentIdx);
    } catch (_) {}
  });

  await Promise.all(fetches);
}

function updateCityMarkerAt(name, idx) {
  const store = cityStore[name];
  if (!store || !store.series || !store.series.length) return;
  const safeIdx = Math.min(idx, store.series.length - 1);
  const item = store.series[safeIdx];
  const t    = getP(item.parameters, 't');
  const tcc  = getP(item.parameters, 'tcc_mean');
  const pcat = getP(item.parameters, 'pcat');
  const id   = 'cm-' + name.replace(/\s+/g, '_');
  const el   = document.getElementById(id);
  if (!el) return;
  el.querySelector('.cm-icon').textContent = weatherIcon(pcat, tcc, t);
  const tempEl = el.querySelector('.cm-temp');
  tempEl.textContent = t !== null ? t.toFixed(1) + '°' : '–';
  tempEl.className = 'cm-temp ' + tempClass(t);
}

function updateAllCityMarkers(idx) {
  nearbyCities.forEach(c => updateCityMarkerAt(c.n, idx));
}

// ═══════════════════════════════════════
//  Reverse geocode
// ═══════════════════════════════════════
async function reverseGeocode(rlat, rlon) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${rlat}&lon=${rlon}&format=json&accept-language=sv`);
    const d = await res.json();
    const a = d.address || {};
    const name = a.city || a.town || a.village || a.municipality || 'Okänd';
    const region = a.county || a.state || '';
    locationLabel = region ? `${name}, ${region}` : name;
    document.getElementById('locationName').textContent = locationLabel;
    document.getElementById('footerCoords').textContent = `${rlat}°N ${rlon}°E`;
  } catch (_) {}
}

// ═══════════════════════════════════════
//  Search
// ═══════════════════════════════════════
const searchInput = document.getElementById('searchInput');
const searchDropdown = document.getElementById('searchDropdown');
const searchSpinner = document.getElementById('searchSpinner');
let searchTimer = null;

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  if (q.length < 2) { closeDropdown(); return; }
  searchTimer = setTimeout(() => doSearch(q), 400);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDropdown(); searchInput.blur(); }
});

document.addEventListener('click', e => {
  if (!document.getElementById('searchWrap').contains(e.target)) closeDropdown();
});

async function doSearch(q) {
  searchSpinner.classList.add('show');
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&countrycodes=se&addressdetails=1&accept-language=sv`;
    const res = await fetch(url);
    const results = await res.json();
    renderDropdown(results);
  } catch (_) {
    searchDropdown.innerHTML = '<div class="search-empty">Sökning misslyckades</div>';
    searchDropdown.classList.add('open');
  } finally {
    searchSpinner.classList.remove('show');
  }
}

function renderDropdown(results) {
  searchDropdown.innerHTML = '';
  if (!results.length) {
    searchDropdown.innerHTML = '<div class="search-empty">Inga resultat</div>';
    searchDropdown.classList.add('open');
    return;
  }
  results.forEach(r => {
    const a = r.address || {};
    const name = a.city || a.town || a.village || a.municipality || r.display_name.split(',')[0];
    const sub  = [a.county, a.state].filter(Boolean).join(', ') || r.type;
    const el = document.createElement('div');
    el.className = 'search-result';
    el.innerHTML = `<div class="search-result-name">${name}</div><div class="search-result-sub">${sub}</div>`;
    el.addEventListener('click', () => {
      lat = Math.round(parseFloat(r.lat) * 1e4) / 1e4;
      lon = Math.round(parseFloat(r.lon) * 1e4) / 1e4;
      locationLabel = sub ? `${name}, ${sub}` : name;
      document.getElementById('locationName').textContent = locationLabel;
      document.getElementById('footerCoords').textContent = `${lat}°N ${lon}°E`;
      searchInput.value = '';
      closeDropdown();
      map.setView([lat, lon], 9);
      mainMarker.setLatLng([lat, lon]);
      fetchAll();
    });
    searchDropdown.appendChild(el);
  });
  searchDropdown.classList.add('open');
}

function closeDropdown() {
  searchDropdown.classList.remove('open');
  searchDropdown.innerHTML = '';
}

// ═══════════════════════════════════════
//  Slider
// ═══════════════════════════════════════
const slider = document.getElementById('timeSlider');

slider.addEventListener('input', () => {
  currentIdx = +slider.value;
  slider.style.setProperty('--fill', (currentIdx / +slider.max * 100) + '%');
  renderFrame(currentIdx);
  updateAllCityMarkers(currentIdx);
});

// ═══════════════════════════════════════
//  Render main frame
// ═══════════════════════════════════════
function renderFrame(idx) {
  if (!allSeries.length) return;
  idx = Math.min(idx, allSeries.length - 1);
  const item = allSeries[idx];
  const p = item.parameters;
  const d = new Date(item.validTime);

  // Time bar
  document.getElementById('timeDisplay').textContent = fmtDate(d) + ' · ' + fmtTime(d);
  const badge = document.getElementById('timeBadge');
  if (idx === 0) {
    badge.textContent = 'Nu'; badge.className = 'time-badge';
  } else {
    const days = Math.floor(idx / 24), remH = idx % 24;
    badge.textContent = '+' + (days > 0 ? days + 'd ' : '') + remH + 'h';
    badge.className = 'time-badge future';
  }

  const t     = getP(p, 't');
  const ws    = getP(p, 'ws');
  const wd    = getP(p, 'wd');
  const gust  = getP(p, 'gust');
  const msl   = getP(p, 'msl');
  const r     = getP(p, 'r');
  const vis   = getP(p, 'vis');
  const tcc   = getP(p, 'tcc_mean');
  const pcat  = getP(p, 'pcat');
  const pmean = getP(p, 'pmean');

  // Overlay
  const tempEl = document.getElementById('wxTemp');
  tempEl.textContent = t !== null ? t.toFixed(1) + '°' : '–';
  tempEl.className = 'wx-temp ' + tempClass(t);

  const fl = (t !== null && ws !== null) ? windChill(t, ws) : t;
  document.getElementById('wxFeels').textContent = fl !== null ? fl.toFixed(1) : '–';
  document.getElementById('wxIcon').textContent = weatherIcon(pcat, tcc, t);
  document.getElementById('wxCond').textContent = weatherText(pcat, tcc, t);

  document.getElementById('wxWind').textContent = ws !== null ? ws.toFixed(1) : '–';
  document.getElementById('wxDir').textContent = wd !== null ? compass(wd) : '';
  document.getElementById('wxPressure').textContent = msl !== null ? Math.round(msl) : '–';
  document.getElementById('wxHumidity').textContent = r !== null ? Math.round(r) : '–';
  document.getElementById('wxVis').textContent = vis !== null ? (vis/1000).toFixed(1) : '–';
  document.getElementById('wxPrecip').textContent = pmean !== null ? pmean.toFixed(1) : '0.0';
  document.getElementById('wxPrecipType').textContent = PRECIP_NAMES[pcat] || 'Ingen';
  document.getElementById('wxCloud').textContent = tcc !== null ? Math.round(tcc) : '–';

  // Alert
  const alertEl = document.getElementById('wxAlert');
  if (ws > 14) {
    alertEl.textContent = `⚠ Stormvarning · ${ws.toFixed(1)} m/s`;
    alertEl.classList.add('show');
  } else if (pmean > 5) {
    alertEl.textContent = `⚠ Kraftig nederbörd · ${pmean.toFixed(1)} mm/tim`;
    alertEl.classList.add('show');
  } else {
    alertEl.classList.remove('show');
  }

  renderChart(idx);
  renderForecast(idx);
}

// ═══════════════════════════════════════
//  Chart
// ═══════════════════════════════════════
const PARAM_META = {
  t:   {label:'°C',  color:'#2dd4bf', rgb:'45,212,191'},
  ws:  {label:'m/s', color:'#fbbf24', rgb:'251,191,36'},
  msl: {label:'hPa', color:'#818cf8', rgb:'129,140,248'},
  r:   {label:'%',   color:'#67e8f9', rgb:'103,232,249'},
};

function renderChart(startIdx) {
  const c = document.getElementById('mainChart');
  const cx = c.getContext('2d');
  const W = c.offsetWidth, H = 120;
  c.width = W * devicePixelRatio;
  c.height = H * devicePixelRatio;
  c.style.height = H + 'px';
  cx.scale(devicePixelRatio, devicePixelRatio);

  const slice = allSeries.slice(startIdx, Math.min(startIdx + 24, allSeries.length));
  const vals = slice.map(s => getP(s.parameters, activeParam) ?? 0);
  const labels = slice.map(s => new Date(s.validTime).getHours().toString().padStart(2,'0'));
  const meta = PARAM_META[activeParam];
  const isMsl = activeParam === 'msl';
  const pad = {top:14, bottom:24, left:34, right:10};
  const w = W - pad.left - pad.right, h = H - pad.top - pad.bottom;
  const minV = Math.min(...vals) - (isMsl ? 2 : 1);
  const maxV = Math.max(...vals) + (isMsl ? 2 : 1);
  const range = maxV - minV || 1;

  cx.clearRect(0, 0, W, H);

  // Grid lines + labels
  cx.strokeStyle = 'rgba(56,148,198,0.08)';
  cx.lineWidth = 1;
  cx.fillStyle = 'rgba(180,206,222,0.28)';
  cx.font = '9px Inter, sans-serif';
  cx.textAlign = 'right';
  for (let i = 0; i <= 3; i++) {
    const y = pad.top + (h/3)*i;
    cx.beginPath(); cx.moveTo(pad.left, y); cx.lineTo(W - pad.right, y); cx.stroke();
    cx.fillText((maxV - (range/3)*i).toFixed(isMsl ? 0 : 1), pad.left - 3, y + 3);
  }

  if (vals.length < 2) return;

  const px = i => pad.left + (w/(vals.length-1))*i;
  const py = v => pad.top + h - ((v-minV)/range)*h;

  // Area fill
  const grad = cx.createLinearGradient(0, pad.top, 0, H);
  grad.addColorStop(0, `rgba(${meta.rgb},0.16)`);
  grad.addColorStop(1, `rgba(${meta.rgb},0)`);
  cx.beginPath();
  vals.forEach((v,i) => i === 0 ? cx.moveTo(px(i),py(v)) : cx.lineTo(px(i),py(v)));
  cx.lineTo(px(vals.length-1), pad.top+h);
  cx.lineTo(px(0), pad.top+h);
  cx.closePath();
  cx.fillStyle = grad; cx.fill();

  // Line
  cx.beginPath();
  vals.forEach((v,i) => i === 0 ? cx.moveTo(px(i),py(v)) : cx.lineTo(px(i),py(v)));
  cx.strokeStyle = meta.color;
  cx.lineWidth = 1.8; cx.lineJoin = 'round';
  cx.stroke();

  // X labels
  cx.fillStyle = 'rgba(180,206,222,0.28)';
  cx.textAlign = 'center';
  vals.forEach((_,i) => { if (i%4===0) cx.fillText(labels[i]+'h', px(i), H-5); });

  // Dot
  cx.beginPath(); cx.arc(px(0), py(vals[0]), 3.5, 0, Math.PI*2);
  cx.fillStyle = meta.color; cx.fill();
  cx.strokeStyle = '#08152100'; cx.lineWidth = 0; cx.stroke();
}

// ═══════════════════════════════════════
//  Forecast list
// ═══════════════════════════════════════
function renderForecast(startIdx) {
  const strip = document.getElementById('forecastStrip');
  strip.innerHTML = '';
  const end = Math.min(startIdx + 36, allSeries.length);
  for (let i = startIdx; i < end; i += 1) {
    const s = allSeries[i];
    const p = s.parameters;
    const d = new Date(s.validTime);
    const t    = getP(p, 't');
    const ws   = getP(p, 'ws');
    const pcat = getP(p, 'pcat');
    const tcc  = getP(p, 'tcc_mean');
    const el = document.createElement('div');
    el.className = 'fcast-row' + (i === startIdx ? ' current' : '');
    el.innerHTML = `
      <div class="fcast-time">${d.getHours().toString().padStart(2,'0')}:00<br><span style="font-size:9px;color:var(--muted2)">${d.toLocaleDateString('sv-SE',{weekday:'short'})}</span></div>
      <div class="fcast-icon">${weatherIcon(pcat, tcc, t)}</div>
      <div class="fcast-desc">${weatherText(pcat, tcc, t)}</div>
      <div class="fcast-temp ${tempClass(t)}">${t !== null ? t.toFixed(1) : '–'}°</div>
      <div class="fcast-wind">${ws !== null ? ws.toFixed(1) : '–'} m/s</div>
    `;
    strip.appendChild(el);
  }
}

// Chart tabs
document.querySelectorAll('.chart-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.chart-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeParam = btn.dataset.param;
    renderChart(currentIdx);
  });
});

// ═══════════════════════════════════════
//  Fetch main weather
// ═══════════════════════════════════════
async function fetchMainWeather() {
  const url = `https://opendata-download-metfcst.smhi.se/api/category/pmp3g/version/2/geotype/point/lon/${lon}/lat/${lat}/data.json`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  allSeries = data.timeSeries;
  currentIdx = 0;
  slider.max = allSeries.length - 1;
  slider.value = 0;
  slider.style.setProperty('--fill', '0%');
  renderFrame(0);
}

// ═══════════════════════════════════════
//  Fetch everything
// ═══════════════════════════════════════
async function fetchAll() {
  document.getElementById('loaderText').textContent = `Hämtar data för ${locationLabel}…`;
  document.getElementById('loader').classList.remove('gone');
  document.getElementById('wxOverlay').classList.add('loading');
  try {
    await fetchMainWeather();
    loadNearbyCities(); // async, no await — load in background
  } catch (e) {
    console.error(e);
    document.getElementById('wxCond').textContent = 'Kunde inte hämta data';
  } finally {
    document.getElementById('loader').classList.add('gone');
    document.getElementById('wxOverlay').classList.remove('loading');
  }
}

window.addEventListener('resize', () => renderChart(currentIdx));

// ═══════════════════════════════════════
//  Theme toggle
// ═══════════════════════════════════════
const themeBtn  = document.getElementById('themeBtn');
const themeIcon = document.getElementById('themeIcon');

const SUN_SVG  = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
const MOON_SVG = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';

let isLight = localStorage.getItem('theme') === 'light';

function applyTheme() {
  document.documentElement.classList.toggle('light', isLight);
  themeIcon.innerHTML = isLight ? SUN_SVG : MOON_SVG;
  // Swap map tiles
  tileLayer.setUrl(isLight ? TILES.light : TILES.dark);
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

themeBtn.addEventListener('click', () => {
  isLight = !isLight;
  applyTheme();
});

applyTheme(); // apply saved preference on load

// ═══════════════════════════════════════
//  Geolocation
// ═══════════════════════════════════════
const locateBtn = document.getElementById('locateBtn');

locateBtn.addEventListener('click', () => {
  if (!navigator.geolocation) {
    alert('Din webbläsare stödjer inte positionering.');
    return;
  }
  locateBtn.classList.add('loading');
  locateBtn.querySelector('span') && (locateBtn.querySelector('span').textContent = 'Letar…');

  navigator.geolocation.getCurrentPosition(
    pos => {
      lat = Math.round(pos.coords.latitude  * 1e4) / 1e4;
      lon = Math.round(pos.coords.longitude * 1e4) / 1e4;
      locateBtn.classList.remove('loading');
      map.setView([lat, lon], 10);
      mainMarker.setLatLng([lat, lon]);
      reverseGeocode(lat, lon);
      fetchAll();
    },
    err => {
      locateBtn.classList.remove('loading');
      const msgs = {
        1: 'Åtkomst till position nekad.',
        2: 'Kunde inte hämta position.',
        3: 'Timeout vid positionering.',
      };
      alert(msgs[err.code] || 'Positionering misslyckades.');
    },
    { timeout: 10000, maximumAge: 60000, enableHighAccuracy: true }
  );
});

// ═══════════════════════════════════════
//  Resizable panel
// ═══════════════════════════════════════
const panelColEl = document.querySelector('.panel-col');
const resizeHandleEl = document.getElementById('resizeHandle');
const PANEL_MIN = 280, PANEL_MAX = 620;
let isResizing = false;

const savedPanelWidth = localStorage.getItem('panelWidth');
if (savedPanelWidth) panelColEl.style.width = savedPanelWidth + 'px';

resizeHandleEl.addEventListener('mousedown', e => {
  isResizing = true;
  resizeHandleEl.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});

window.addEventListener('mousemove', e => {
  if (!isResizing) return;
  const w = Math.min(PANEL_MAX, Math.max(PANEL_MIN, e.clientX));
  panelColEl.style.width = w + 'px';
  renderChart(currentIdx);
});

window.addEventListener('mouseup', () => {
  if (!isResizing) return;
  isResizing = false;
  resizeHandleEl.classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  localStorage.setItem('panelWidth', parseInt(panelColEl.style.width));
});

// ═══════════════════════════════════════
//  Init
// ═══════════════════════════════════════
fetchAll();
setInterval(() => {
  fetchMainWeather().catch(console.error);
  loadNearbyCities();
}, 10 * 60 * 1000);
</script>
